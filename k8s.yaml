apiVersion: apps/v1
kind: Deployment
metadata:
  name: xeno-crm-deployment
  labels:
    app: xeno-crm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xeno-crm
  template:
    metadata:
      labels:
        app: xeno-crm
    spec:
      containers:
      - name: xeno-crm-container
        image: xeno-ai-crm:latest
        imagePullPolicy: Never # Force Kubernetes to use local built docker image
        ports:
        - containerPort: 3000
          name: crm-port
        - containerPort: 3001
          name: channel-port
        env:
        - name: PORT
          value: "3000"
        - name: CHANNEL_PORT
          value: "3001"
        - name: CHANNEL_SERVICE_URL
          value: "http://localhost:3001/api/channel/send"
        - name: CRM_CALLBACK_URL
          value: "http://localhost:3000/api/callbacks/receipt"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: xeno-crm-service
spec:
  type: NodePort
  selector:
    app: xeno-crm
  ports:
  - name: http-crm
    port: 3000
    targetPort: 3000
    nodePort: 30080 # Expose CRM publicly at http://localhost:30080
---
apiVersion: v1
kind: Service
metadata:
  name: xeno-channel-service
spec:
  type: ClusterIP
  selector:
    app: xeno-crm
  ports:
  - name: http-channel
    port: 3001
    targetPort: 3001
